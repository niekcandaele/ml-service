# Google Cloud Build configuration for ML Service
# Triggered on push to main branch
# Builds Docker image and deploys to Cloud Run GPU

steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ml-service:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ml-service:latest'
      - '.'

  # Push image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/ml-service:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/ml-service:latest'

  # Deploy to Cloud Run
  # Note: Adjust --region and service name as needed
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ml-service'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ml-service:$SHORT_SHA'
      - '--region'
      - 'us-central1'  # Change to your preferred region
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'  # Remove for authenticated-only access
      # Uncomment for GPU support (requires quota):
      # - '--gpu'
      # - '1'
      # - '--gpu-type'
      # - 'nvidia-l4'
      # - '--cpu'
      # - '4'
      # - '--memory'
      # - '16Gi'

# Increase disk size and use faster machine for large ML image builds
options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 200  # Plenty of space for 14GB image + build cache
  logging: CLOUD_LOGGING_ONLY

# Timeout for entire build (including 14GB image build)
timeout: '3600s'  # 60 minutes
