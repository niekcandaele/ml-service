# Google Cloud Build configuration for ML Service
# Triggered on push to main branch
# Builds Docker image and deploys to Cloud Run GPU

steps:
  # Build Docker image with HuggingFace token for model download
  # Using bash entrypoint to properly interpolate secrets (Cloud Build requirement)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          --build-arg HUGGING_FACE_HUB_TOKEN=$$HUGGING_FACE_HUB_TOKEN \
          -t europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ml-service/ml-service:$SHORT_SHA \
          -t europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ml-service/ml-service:latest \
          .
    secretEnv: ['HUGGING_FACE_HUB_TOKEN']

  # Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ml-service/ml-service:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ml-service/ml-service:latest'

  # Deploy to Cloud Run with GPU
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ml-service'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ml-service/ml-service:$SHORT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--gpu=1'
      - '--gpu-type=nvidia-l4'
      - '--no-gpu-zonal-redundancy'
      - '--cpu=4'
      - '--memory=16Gi'
      - '--max-instances=1'
      - '--set-secrets=GOOGLE_API_KEY=google-api-key:latest'
      - '--set-secrets=API_KEY=ml-service-api-key:latest'

# Increase disk size and use faster machine for large ML image builds
options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 200  # Plenty of space for 14GB image + build cache
  logging: CLOUD_LOGGING_ONLY

# Timeout for entire build (including 14GB image build)
timeout: '3600s'  # 60 minutes

# Make HuggingFace token available during build for model download
availableSecrets:
  secretManager:
  - versionName: projects/takaro-dev/secrets/huggingface-token/versions/1
    env: 'HUGGING_FACE_HUB_TOKEN'
